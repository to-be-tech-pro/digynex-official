<!doctype html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8" />
    <meta name="description" content="<%= productDescription %>" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/x-icon" sizes="128x128" href="icons/favicon128x128.ico" />
    <link rel="icon" type="image/x-icon" sizes="92x92" href="icons/favicon 92x92.ico" />
    <link rel="icon" type="image/x-icon" sizes="32x32" href="icons/favicon 32x32.ico" />
    <link rel="icon" type="image/x-icon" sizes="16x16" href="icons/favicon16x16.ico" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <!-- quasar:entry-point -->

    <!-- FontAwesome for AI Chat Widget -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
      :root {
        --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 100%);
        --liquid-gold: #bf953f;
        --deep-navy: #0a0f1c;
      }
      .ai-chat-widget { position: fixed; bottom: 30px; right: 30px; z-index: 5000; display: flex; flex-direction: column; align-items: flex-end; font-family: 'Inter', sans-serif; }
      .chat-peek { background: white; color: #1a1a1a; padding: 12px 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 15px; font-size: 14px; font-weight: 500; white-space: nowrap; animation: slideInPeek 0.5s ease-out; transform-origin: right bottom; border-right: 4px solid var(--liquid-gold); }
      @keyframes slideInPeek { from { opacity: 0; transform: scale(0.8) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
      .chat-trigger-btn { width: 65px; height: 65px; border-radius: 50%; background: var(--gold-gradient); border: 3px solid #0f1624; box-shadow: 0 8px 25px rgba(191, 149, 63, 0.4); cursor: pointer; overflow: hidden; transition: 0.4s; display: flex; align-items: center; justify-content: center; position: relative; }
      .chat-trigger-btn:hover { transform: scale(1.1); }
      .chat-trigger-btn img { width: 100%; height: 100%; object-fit: cover; }
      .unread-dot { position: absolute; top: 5px; right: 5px; width: 12px; height: 12px; background: #ff4757; border: 2px solid white; border-radius: 50%; }
      .chat-window { position: absolute; bottom: 85px; right: 0; width: 380px; height: 600px; background: #0f1624; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); transform: translateY(30px) scale(0.95); opacity: 0; pointer-events: none; transition: 0.4s; border: 1px solid rgba(255, 255, 255, 0.1); }
      .chat-window.active { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }
      .chat-header { padding: 20px; background: var(--gold-gradient); color: var(--deep-navy); display: flex; justify-content: space-between; align-items: center; }
      .header-info { display: flex; align-items: center; gap: 12px; }
      .header-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
      .status-dot { width: 8px; height: 8px; background: #2ed573; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #2ed573; }
      .close-btn-chat { background: none; border: none; font-size: 28px; color: var(--deep-navy); cursor: pointer; }
      .chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #0a0f1c; }
      .chat-msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
      .chat-msg.bot { align-self: flex-start; background: #1e2636; color: white; border-bottom-left-radius: 2px; }
      .chat-msg.user { align-self: flex-end; background: #bf953f; color: #0a0f1c; font-weight: 500; border-bottom-right-radius: 2px; }
      .quick-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
      .quick-actions button { background: rgba(191, 149, 63, 0.05); border: 1px solid rgba(191, 149, 63, 0.2); color: #bf953f; padding: 10px; border-radius: 10px; font-size: 13px; text-align: left; cursor: pointer; }
      .chat-footer { padding: 15px; background: #141b2b; display: flex; gap: 10px; align-items: center; }
      .chat-footer input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 12px 15px; border-radius: 25px; color: white; }
      .send-btn { width: 40px; height: 40px; border-radius: 50%; background: #bf953f; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
      .chat-branding { font-size: 10px; text-align: center; padding: 5px; background: #141b2b; color: rgba(255,255,255,0.3); }
      .lang-selector select { width: 100%; padding: 10px 35px 10px 15px; border-radius: 12px; background-color: #f1f3f5; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23bf953f%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 10px auto; border: 2px solid var(--liquid-gold); color: #1a1a1a; font-size: 13px; font-weight: 600; cursor: pointer; appearance: none; -webkit-appearance: none; margin-top: 5px; }
    </style>

    <div class="ai-chat-widget">
      <div class="chat-peek" id="chatPeek"><span>👋 Need help with TMS?</span></div>
      <div id="chatWindow" class="chat-window">
        <div class="chat-header">
          <div class="header-info">
            <img src="ai-avatar.webp" alt="Bot Avatar" class="header-avatar">
            <div class="header-text">
              <h4 style="margin:0; font-size:16px;">DigyNex TMS Buddy</h4>
              <p style="margin:0; font-size:11px;"><span class="status-dot"></span> Online</p>
            </div>
          </div>
          <button class="close-btn-chat" onclick="toggleChat()">&times;</button>
        </div>
        <div id="chatBody" class="chat-body">
          <div class="chat-msg bot welcome-msg">
            <p>Welcome to DigyNex TMS Center! 🇸🇪 How can I help you manage your school?</p>
            <div class="lang-selector">
              <select id="langSelect" onchange="changeLanguage()">
                <option value="en">English (Global)</option>
                <option value="si">සිංහල (Sri Lanka)</option>
                <option value="sv">Svenska (Sweden)</option>
              </select>
            </div>
          </div>
          <div class="quick-actions">
            <button onclick="quickAction('How to take attendance?')">📌 Attendance Guide</button>
            <button onclick="quickAction('Fee management help')">💰 Fee Management</button>
          </div>
        </div>
        <div class="chat-footer">
          <input type="text" id="chatInput" placeholder="Type..." onkeypress="handleChatEnter(event)">
          <button class="send-btn" onclick="sendChatMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
        <div class="chat-branding">
          Powered by <img src="logo.svg" alt="DigyNex" style="height: 12px; vertical-align: middle; margin-right: 4px; opacity: 0.8;"> DigyNex AI Agent ⚡
        </div>
      </div>
      <button class="chat-trigger-btn" onclick="toggleChat()">
        <img src="ai-avatar.webp" alt="AI Avatar">
      </button>
    </div>

    <script>
      const chatWindow = document.getElementById("chatWindow");
      const chatPeek = document.getElementById("chatPeek");
      const chatBody = document.getElementById("chatBody");
      const chatInput = document.getElementById("chatInput");
      const langSelect = document.getElementById("langSelect");
      let chatSessionId = "tms-" + Math.random().toString(36).substring(7);

      function toggleChat() { chatWindow.classList.toggle("active"); if (chatPeek) chatPeek.style.display = "none"; }
      function changeLanguage() {
        const lang = langSelect.value;
        const msg = document.querySelector(".welcome-msg p");
        if(lang === "si") msg.innerText = "ආයුබෝවන්! 🇸🇪 ඔබගේ පාසල් කළමනාකරණයට උදව්වක් අවශ්‍යද?";
        else if(lang === "sv") msg.innerText = "Välkommen! 🇸🇪 Behöver du hjälp med skolhantering?";
        else msg.innerText = "Welcome! 🇸🇪 Need help with school management?";
      }
      function quickAction(txt) { chatInput.value = txt; sendChatMessage(); }
      function handleChatEnter(e) { if (e.key === "Enter") sendChatMessage(); }
      function sendChatMessage() {
        const text = chatInput.value.trim(); if (!text) return;
        addMessage(text, "user"); chatInput.value = "";
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000); // 15s timeout
        
        fetch("https://n8n.digynex.se/webhook/f639f695-c06f-4bfa-8fcb-e971392f7966", {
          method: "POST", headers: { "Content-Type": "application/json" },
          signal: controller.signal,
          body: JSON.stringify({ message: text, sessionId: chatSessionId, source: "tms", language: langSelect.value })
        })
        .then(res => res.text()).then(txt => { 
          clearTimeout(timeoutId);
          try {
          addMessage(data.output || data.message || "Processed!", "bot");
          } catch(e) {
            addMessage(txt || "Sync detected. Please verify via WhatsApp: <a href='https://digynex.se/whatsapp/' target='_blank' style='color: #bf953f; text-decoration: underline;'>Official Support Portal</a>", "bot");
          }
        })
        .catch(err => {
          console.error("Chat Error:", err);
          addMessage("Nexus sync error. Please contact us via WhatsApp: <a href='https://digynex.se/whatsapp/' target='_blank' style='color: #bf953f; text-decoration: underline;'>Official Support Portal</a>", "bot");
        });
      }
      function addMessage(text, sender) {
        const div = document.createElement("div"); div.className = 'chat-msg ' + sender;
        div.innerHTML = text; chatBody.appendChild(div); chatBody.scrollTop = chatBody.scrollHeight;
      }
    </script>
  </body>
</html>
